version: '3.9'

services:
  # ===========================================
  # MYSQL
  # ===========================================
  mysql:
    image: mysql:9.0
    container_name: onlyroll-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-onlyroll_db}
      MYSQL_USER: ${MYSQL_USER:-onlyroll_db}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-onlyroll_docker_pass}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${DB_PORT:-3306}:3306"
    networks:
      - onlyroll-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ===========================================
  # REDIS
  # ===========================================
  redis:
    image: redis:7.2-alpine
    container_name: onlyroll-redis
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis-data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - onlyroll-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ===========================================
  # BACKEND PHP-FPM
  # ===========================================
  php-fpm:
    build:
      context: ./backend
      target: php_dev
      args:
        APP_ENV: dev
        APP_DEBUG: 1
    container_name: onlyroll-php
    environment:
      APP_ENV: dev
      APP_DEBUG: true
      APP_SECRET: ${APP_SECRET:-your-app-secret-change-in-production}
      DEFAULT_URI: ${DEFAULT_URI:-http://localhost}
      DATABASE_URL: ${DATABASE_URL:-mysql://onlyroll_db:onlyroll_docker_pass@mysql:3306/onlyroll_db?serverVersion=9.0&charset=utf8mb4}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-%kernel.project_dir%/config/jwt/private.pem}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-%kernel.project_dir%/config/jwt/public.pem}
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:-onlyroll123!}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-http://localhost:5173}
      MERCURE_URL: ${MERCURE_URL:-http://mercure:3000/.well-known/mercure}
      MERCURE_PUBLIC_URL: ${MERCURE_PUBLIC_URL:-http://localhost:3000/.well-known/mercure}
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET:-uhMPKzA2Ta034+z/ktuKM0w6LZTrj1R1tgPBJ4Emwtg=}
    volumes:
      - ./backend:/var/www/html:cached
      - backend-vendor:/var/www/html/vendor
      - backend-var:/var/www/html/var
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - onlyroll-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ===========================================
  # NGINX (Reverse Proxy API)
  # ===========================================
  nginx:
    image: nginx:1.25-alpine
    container_name: onlyroll-nginx
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend/public:/var/www/html/public:ro
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      - php-fpm
    networks:
      - onlyroll-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  # ===========================================
  # FRONTEND (Dev Server Vite)
  # ===========================================
  frontend:
    build:
      context: ./frontend
      target: node_dev
    container_name: onlyroll-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost/api}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:3000}
      NODE_ENV: development
    volumes:
      - ./frontend:/app:cached
      - frontend-node-modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    networks:
      - onlyroll-network
    command: npm run dev -- --host 0.0.0.0

  # ===========================================
  # MERCURE (WebSocket Hub)
  # ===========================================
  mercure:
    image: dunglas/mercure:v0.15
    container_name: onlyroll-mercure
    restart: unless-stopped
    environment:
      SERVER_NAME: ':3000'
      MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
      MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins http://localhost:5173 http://localhost
        anonymous
        log_level debug
    ports:
      - "${MERCURE_PORT:-3000}:3000"
    volumes:
      - mercure-data:/data
    networks:
      - onlyroll-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/.well-known/mercure"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mysql-data:
  redis-data:
  backend-vendor:
  backend-var:
  frontend-node-modules:
  mercure-data:

networks:
  onlyroll-network:
    driver: bridge
    name: onlyroll-network
