user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    upstream php_backend {
        server php-fpm:9000;
    }

    server {
        listen 80;
        server_name localhost;
        root /var/www/html/public;
        index index.php;

        # Augmenter la limite de taille des uploads (pour les images de carte)
        client_max_body_size 100M;

        # PHP-FPM
        location ~ \.php$ {
            fastcgi_pass php_backend;
            fastcgi_split_path_info ^(.+\.php)(/.*)$;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            fastcgi_buffer_size 128k;
            fastcgi_buffers 4 256k;

            # Timeouts pour les uploads de gros fichiers
            fastcgi_read_timeout 300;
            fastcgi_send_timeout 300;

            # Forward CORS headers to PHP
            fastcgi_param HTTP_ORIGIN $http_origin;
            fastcgi_param HTTP_ACCESS_CONTROL_REQUEST_METHOD $http_access_control_request_method;
            fastcgi_param HTTP_ACCESS_CONTROL_REQUEST_HEADERS $http_access_control_request_headers;
        }

        # API Routes
        location /api {
            try_files $uri /index.php$is_args$args;
        }

        # Health Check
        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        location ~ /\. {
            deny all;
        }
    }
}
