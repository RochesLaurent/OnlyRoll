version: '3.9'

services:
  mysql:
    image: mysql:9.0
    container_name: onlyroll-mysql-prod
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - onlyroll-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: onlyroll-redis-prod
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - onlyroll-network
    restart: unless-stopped

  php-fpm:
    build:
      context: ./backend
      target: php_prod
      args:
        APP_ENV: prod
        APP_DEBUG: 0
    container_name: onlyroll-php-prod
    environment:
      APP_ENV: prod
      APP_DEBUG: 0
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_PASSPHRASE: ${JWT_PASSPHRASE}
      MERCURE_URL: http://mercure:3000/.well-known/mercure
      MERCURE_PUBLIC_URL: ${MERCURE_PUBLIC_URL}
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET}
    volumes:
      - backend-var:/var/www/html/var
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - onlyroll-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: nginx_prod
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_WS_URL: ${VITE_WS_URL}
    container_name: onlyroll-frontend-prod
    networks:
      - onlyroll-network
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: onlyroll-nginx-prod
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - php-fpm
      - frontend
    networks:
      - onlyroll-network
    restart: unless-stopped

  mercure:
    image: dunglas/mercure:v0.15
    container_name: onlyroll-mercure-prod
    environment:
      SERVER_NAME: ':3000'
      MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_JWT_SECRET}
      MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_JWT_SECRET}
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins ${CORS_ALLOW_ORIGIN}
    networks:
      - onlyroll-network
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
  backend-var:

networks:
  onlyroll-network:
    driver: bridge
    name: onlyroll-network-prod
