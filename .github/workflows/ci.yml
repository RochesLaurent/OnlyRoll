name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

env:
  PHP_VERSION: '8.3'
  NODE_VERSION: '20'
  COMPOSER_VERSION: '2'

jobs:
  # ============================================
  # JOB 0: VALIDATION DOCKER
  # ============================================
  docker-validation:
    name: Validate Docker Setup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env.docker for CI
        run: |
          cp .env.docker.example .env.docker
          echo "MYSQL_ROOT_PASSWORD=root" >> .env.docker
          echo "MYSQL_DATABASE=onlyroll_test" >> .env.docker
          echo "MYSQL_USER=onlyroll_db" >> .env.docker
          echo "MYSQL_PASSWORD=onlyroll_docker_pass" >> .env.docker

      - name: Build Docker images
        run: docker compose build

      - name: Start Docker services
        run: docker compose up -d

      - name: Wait for services to be healthy
        run: |
          echo "⏳ Waiting for services to be healthy..."
          timeout 120 bash -c 'until docker compose ps | grep -q "healthy"; do sleep 2; done' || (docker compose logs && exit 1)

      - name: Check API health
        run: |
          curl -f http://localhost/health || exit 1

      - name: Check Frontend build
        run: |
          docker compose logs frontend | grep -q "ready in" || exit 1

      - name: Check Mercure
        run: |
          curl -s http://localhost:3000/.well-known/mercure > /dev/null && echo "Mercure is running" || echo "Mercure check returned a response (may be expected)"

      - name: Stop containers
        if: always()
        run: docker compose down -v

  # ============================================
  # JOB 1: TESTS BACKEND (PHP/Symfony)
  # ============================================
  backend-tests:
    name: Backend Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        php: ['8.3']
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: onlyroll_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, filter, gd, json, redis
          coverage: xdebug
          tools: composer:v2
      
      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      
      - name: Install Composer dependencies
        working-directory: ./backend
        run: composer install --no-interaction --prefer-dist --optimize-autoloader
      
      - name: Copy .env.test
        working-directory: ./backend
        run: |
          cp .env.test.dist .env.test
          echo "DATABASE_URL=mysql://root:root@127.0.0.1:3306/onlyroll_test?serverVersion=8.0" >> .env.test
          echo "REDIS_URL=redis://127.0.0.1:6379" >> .env.test
      
      - name: Generate JWT keys for testing
        working-directory: ./backend
        run: |
          mkdir -p config/jwt
          openssl genrsa -out config/jwt/private.pem -aes256 -passout pass:testpassphrase 4096
          openssl rsa -pubout -in config/jwt/private.pem -out config/jwt/public.pem -passin pass:testpassphrase
          echo "JWT_SECRET_KEY=%kernel.project_dir%/config/jwt/private.pem" >> .env.test
          echo "JWT_PUBLIC_KEY=%kernel.project_dir%/config/jwt/public.pem" >> .env.test
          echo "JWT_PASSPHRASE=testpassphrase" >> .env.test
      
      - name: Create database schema
        working-directory: ./backend
        run: |
          php bin/console doctrine:database:create --env=test --if-not-exists
          php bin/console doctrine:migrations:migrate --env=test --no-interaction
      
      - name: Run PHPUnit tests with coverage
        working-directory: ./backend
        run: |
          vendor/bin/phpunit --coverage-text --coverage-clover=coverage.xml --log-junit=test-results.xml
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.php == '8.3'
        with:
          files: ./backend/coverage.xml
          flags: backend
          name: backend-coverage
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results-php-${{ matrix.php }}
          path: ./backend/test-results.xml

  # ============================================
  # JOB 2: CODE QUALITY BACKEND
  # ============================================
  backend-quality:
    name: Backend Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql
          tools: composer:v2
      
      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      
      - name: Install Composer dependencies
        working-directory: ./backend
        run: composer install --no-interaction --prefer-dist --optimize-autoloader
      
      - name: Run PHPStan (Static Analysis)
        working-directory: ./backend
        run: vendor/bin/phpstan analyse src --error-format=github
      
      - name: Check PHP CS Fixer (Code Style)
        working-directory: ./backend
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --verbose

  # ============================================
  # JOB 3: TESTS FRONTEND (Vue/TypeScript)
  # ============================================
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Run unit tests with coverage
        working-directory: ./frontend
        run: npm run test:unit -- --coverage
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage
      
      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Build app for E2E tests
        working-directory: ./frontend
        run: npm run build
      
      - name: Run E2E tests
        working-directory: ./frontend
        run: npm run test:e2e
        env:
          CI: true
      
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: ./frontend/playwright-report/
          retention-days: 7

  # ============================================
  # JOB 4: CODE QUALITY FRONTEND
  # ============================================
  frontend-quality:
    name: Frontend Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        working-directory: ./frontend
        run: npm run lint
      
      - name: Check Prettier formatting
        working-directory: ./frontend
        run: npm run format:check
      
      - name: TypeScript type checking
        working-directory: ./frontend
        run: npm run type-check
      
      - name: Build check
        working-directory: ./frontend
        run: npm run build

  # ============================================
  # JOB 5: SECURITY CHECKS
  # ============================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Backend security check (Symfony)
        uses: symfonycorp/security-checker-action@v5
        with:
          lock: ./backend/composer.lock
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Frontend security audit
        working-directory: ./frontend
        run: npm audit --audit-level=moderate --omit=dev

  # ============================================
  # JOB 6: BUILD DOCKER IMAGES (Sans déploiement)
  # ============================================
  docker-build:
    name: Build & Validate Docker Images
    runs-on: ubuntu-latest
    needs: [docker-validation, backend-tests, backend-quality, frontend-tests, frontend-quality, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build Backend (Production)
      - name: Build backend production image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: php_prod
          push: false
          tags: onlyroll-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_ENV=prod
            APP_DEBUG=0

      # Build Frontend (Production)
      - name: Build frontend production image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          target: nginx_prod
          push: false
          tags: onlyroll-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=https://api.onlyroll.com
            VITE_WS_URL=wss://mercure.onlyroll.com

      # Test des images buildées
      - name: Test backend image
        run: |
          docker run --rm onlyroll-backend:latest php -v
          docker run --rm onlyroll-backend:latest php bin/console --version || echo "Console not available in prod mode"

      - name: Test frontend image
        run: |
          docker run -d --name frontend-test -p 8080:80 onlyroll-frontend:latest
          sleep 5
          curl -f http://localhost:8080/ || exit 1
          docker stop frontend-test

      - name: Show image sizes
        run: |
          echo "📦 Docker Image Sizes:"
          docker images | grep onlyroll

  # ============================================
  # JOB 7: NOTIFICATION FINALE
  # ============================================
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [docker-validation, backend-tests, frontend-tests, backend-quality, frontend-quality]
    if: always()

    steps:
      - name: Check job statuses
        run: |
          echo "Docker Validation: ${{ needs.docker-validation.result }}"
          echo "Backend Tests: ${{ needs.backend-tests.result }}"
          echo "Frontend Tests: ${{ needs.frontend-tests.result }}"
          echo "Backend Quality: ${{ needs.backend-quality.result }}"
          echo "Frontend Quality: ${{ needs.frontend-quality.result }}"