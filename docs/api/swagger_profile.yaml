openapi: 3.0.3
info:
  title: OnlyRoll API - Module Profile Utilisateur
  description: |
    API pour la gestion des profils utilisateur de la plateforme OnlyRoll.
    
    Ce module permet de gérer les opérations CRUD sur les utilisateurs :
    - Consultation des profils
    - Modification des informations personnelles
    - Gestion des avatars
    - Administration des comptes
    
    ## Authentification
    L'API utilise JWT Bearer tokens pour l'authentification.
    
    ## Autorisation
    - **ROLE_USER** : Accès aux fonctionnalités de base
    - **ROLE_ADMIN** : Accès aux fonctionnalités d'administration
  version: 1.0.0
  contact:
    name: OnlyRoll Support
    email: support@onlyroll.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.onlyroll.com/v1
    description: Production server
  - url: https://dev-api.onlyroll.com/v1
    description: Development server
  - url: http://localhost:8000/api
    description: Local development server

paths:
  /users:
    get:
      tags:
        - Users
      summary: Récupère la liste des utilisateurs
      description: Retourne une liste paginée des utilisateurs publics vérifiés
      operationId: getUsersList
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: Numéro de page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Nombre d'éléments par page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: search
          in: query
          description: Recherche textuelle dans le pseudo
          required: false
          schema:
            type: string
            minLength: 2
        - name: sort
          in: query
          description: Champ de tri
          required: false
          schema:
            type: string
            enum: [created_at, pseudo, last_login]
            default: created_at
        - name: order
          in: query
          description: Ordre de tri
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: Liste des utilisateurs récupérée avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsersListResponse'
              example:
                data:
                  - user_id: 1
                    user_pseudo: "DragonMaster"
                    user_avatar: "https://api.onlyroll.com/uploads/avatars/1/avatar.jpg"
                    user_timezone: "Europe/Paris"
                    user_language: "fr"
                    user_created_at: "2024-01-15T10:30:00Z"
                    user_last_login: "2024-12-15T09:15:00Z"
                pagination:
                  current_page: 1
                  per_page: 20
                  total: 150
                  total_pages: 8
                  has_next: true
                  has_prev: false
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me:
    get:
      tags:
        - Profile
      summary: Récupère le profil de l'utilisateur connecté
      description: Retourne toutes les informations du profil de l'utilisateur authentifié
      operationId: getMyProfile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profil utilisateur récupéré avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
              example:
                user_id: 1
                user_pseudo: "DragonMaster"
                user_email: "dragon@example.com"
                user_roles: ["ROLE_USER"]
                user_is_verified: true
                user_avatar: "https://api.onlyroll.com/uploads/avatars/1/avatar.jpg"
                user_timezone: "Europe/Paris"
                user_language: "fr"
                user_created_at: "2024-01-15T10:30:00Z"
                user_updated_at: "2024-12-01T14:20:00Z"
                user_last_login: "2024-12-15T09:15:00Z"
                statistics:
                  games_as_master: 3
                  games_as_player: 12
                  total_play_time_hours: 156
        '401':
          $ref: '#/components/responses/Unauthorized'

    put:
      tags:
        - Profile
      summary: Met à jour complètement le profil utilisateur
      description: Met à jour toutes les informations modifiables du profil
      operationId: updateMyProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
            example:
              user_pseudo: "NewDragonMaster"
              user_email: "newdragon@example.com"
              user_avatar: "https://api.onlyroll.com/uploads/avatars/1/new-avatar.jpg"
              user_timezone: "Europe/London"
              user_language: "en"
      responses:
        '200':
          description: Profil mis à jour avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileUpdateResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

    patch:
      tags:
        - Profile
      summary: Met à jour partiellement le profil utilisateur
      description: Met à jour une ou plusieurs informations du profil
      operationId: patchMyProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPatchRequest'
            example:
              user_timezone: "Asia/Tokyo"
      responses:
        '200':
          description: Profil mis à jour avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

    delete:
      tags:
        - Profile
      summary: Supprime le compte utilisateur
      description: Supprime définitivement le compte de l'utilisateur connecté
      operationId: deleteMyAccount
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteAccountRequest'
            example:
              password: "userPassword123!"
              confirmation: "DELETE_MY_ACCOUNT"
      responses:
        '200':
          description: Compte supprimé avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteAccountResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /users/me/password:
    put:
      tags:
        - Profile
      summary: Change le mot de passe
      description: Met à jour le mot de passe de l'utilisateur connecté
      operationId: changePassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
            example:
              current_password: "currentPassword123!"
              new_password: "newSecurePassword456!"
              confirm_password: "newSecurePassword456!"
      responses:
        '200':
          description: Mot de passe modifié avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordChangeResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /users/me/avatar:
    post:
      tags:
        - Profile
      summary: Upload un avatar
      description: Upload une nouvelle image d'avatar pour l'utilisateur
      operationId: uploadAvatar
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                avatar:
                  type: string
                  format: binary
                  description: Fichier image (JPG, PNG, WebP max 2MB)
              required:
                - avatar
      responses:
        '201':
          description: Avatar uploadé avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvatarUploadResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'

  /users/{id}:
    get:
      tags:
        - Users
      summary: Récupère le profil public d'un utilisateur
      description: Retourne les informations publiques d'un utilisateur spécifique
      operationId: getUserProfile
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID de l'utilisateur
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Profil utilisateur récupéré avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicUserProfile'
              example:
                user_id: 42
                user_pseudo: "ElfWizard"
                user_avatar: "https://api.onlyroll.com/uploads/avatars/42/avatar.jpg"
                user_timezone: "America/New_York"
                user_language: "en"
                user_created_at: "2024-03-10T12:00:00Z"
                user_last_login: "2024-12-14T18:30:00Z"
                public_statistics:
                  games_as_master: 1
                  games_as_player: 8
                  member_since_days: 279
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/users:
    get:
      tags:
        - Administration
      summary: Récupère tous les utilisateurs (Admin)
      description: Retourne la liste complète des utilisateurs pour l'administration
      operationId: getAdminUsersList
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: Numéro de page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Nombre d'éléments par page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: search
          in: query
          description: Recherche dans pseudo/email
          required: false
          schema:
            type: string
            minLength: 2
        - name: verified
          in: query
          description: Filtrer par statut de vérification
          required: false
          schema:
            type: boolean
        - name: role
          in: query
          description: Filtrer par rôle
          required: false
          schema:
            type: string
            enum: [ROLE_USER, ROLE_ADMIN]
        - name: sort
          in: query
          description: Champ de tri
          required: false
          schema:
            type: string
            enum: [created_at, pseudo, email, last_login]
            default: created_at
        - name: order
          in: query
          description: Ordre de tri
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: Liste administrative des utilisateurs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUsersListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/users/{id}:
    put:
      tags:
        - Administration
      summary: Met à jour un utilisateur (Admin)
      description: Met à jour les informations d'un utilisateur via l'administration
      operationId: updateUserByAdmin
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID de l'utilisateur
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserUpdateRequest'
            example:
              user_pseudo: "UpdatedPseudo"
              user_email: "updated@example.com"
              user_roles: ["ROLE_USER", "ROLE_ADMIN"]
              user_is_verified: true
              user_timezone: "UTC"
              user_language: "en"
      responses:
        '200':
          description: Utilisateur mis à jour avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Administration
      summary: Supprime un utilisateur (Admin)
      description: Supprime un utilisateur via l'administration
      operationId: deleteUserByAdmin
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID de l'utilisateur
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminDeleteUserRequest'
            example:
              confirmation: "DELETE_USER_ACCOUNT"
              reason: "Violation of terms of service"
              transfer_games_to: null
      responses:
        '200':
          description: Utilisateur supprimé avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDeleteUserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token pour l'authentification

  schemas:
    # Schemas de base
    UserPublic:
      type: object
      properties:
        user_id:
          type: integer
          description: ID unique de l'utilisateur
        user_pseudo:
          type: string
          description: Pseudo de l'utilisateur
        user_avatar:
          type: string
          format: uri
          nullable: true
          description: URL de l'avatar
        user_timezone:
          type: string
          description: Fuseau horaire
        user_language:
          type: string
          description: Code de langue (ISO 639-1)
        user_created_at:
          type: string
          format: date-time
          description: Date de création du compte
        user_last_login:
          type: string
          format: date-time
          nullable: true
          description: Dernière connexion
      required:
        - user_id
        - user_pseudo
        - user_timezone
        - user_language
        - user_created_at

    UserProfile:
      allOf:
        - $ref: '#/components/schemas/UserPublic'
        - type: object
          properties:
            user_email:
              type: string
              format: email
              description: Adresse email
            user_roles:
              type: array
              items:
                type: string
              description: Rôles utilisateur
            user_is_verified:
              type: boolean
              description: Compte vérifié ou non
            user_updated_at:
              type: string
              format: date-time
              description: Date de dernière mise à jour
            statistics:
              $ref: '#/components/schemas/UserStatistics'
          required:
            - user_email
            - user_roles
            - user_is_verified
            - user_updated_at

    UserStatistics:
      type: object
      properties:
        games_as_master:
          type: integer
          description: Nombre de parties en tant que MJ
        games_as_player:
          type: integer
          description: Nombre de parties en tant que joueur
        total_play_time_hours:
          type: integer
          description: Temps de jeu total en heures
      required:
        - games_as_master
        - games_as_player
        - total_play_time_hours

    PublicUserStatistics:
      type: object
      properties:
        games_as_master:
          type: integer
        games_as_player:
          type: integer
        member_since_days:
          type: integer
          description: Nombre de jours depuis l'inscription
      required:
        - games_as_master
        - games_as_player
        - member_since_days

    PublicUserProfile:
      allOf:
        - $ref: '#/components/schemas/UserPublic'
        - type: object
          properties:
            public_statistics:
              $ref: '#/components/schemas/PublicUserStatistics'
          required:
            - public_statistics

    Pagination:
      type: object
      properties:
        current_page:
          type: integer
          minimum: 1
        per_page:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        total_pages:
          type: integer
          minimum: 0
        has_next:
          type: boolean
        has_prev:
          type: boolean
      required:
        - current_page
        - per_page
        - total
        - total_pages
        - has_next
        - has_prev

    AdminStatistics:
      type: object
      properties:
        total_users:
          type: integer
        verified_users:
          type: integer
        admins_count:
          type: integer
        new_this_month:
          type: integer
      required:
        - total_users
        - verified_users
        - admins_count
        - new_this_month

    GamesCount:
      type: object
      properties:
        as_master:
          type: integer
        as_player:
          type: integer
      required:
        - as_master
        - as_player

    # Schemas de requête
    UserUpdateRequest:
      type: object
      properties:
        user_pseudo:
          type: string
          minLength: 3
          maxLength: 50
          pattern: '^[a-zA-Z0-9_-]+
          description: Nouveau pseudo
        user_email:
          type: string
          format: email
          maxLength: 255
          description: Nouvelle adresse email
        user_avatar:
          type: string
          format: uri
          nullable: true
          description: URL du nouvel avatar
        user_timezone:
          type: string
          description: Nouveau fuseau horaire
        user_language:
          type: string
          pattern: '^[a-z]{2}
          description: Nouvelle langue
      additionalProperties: false

    UserPatchRequest:
      type: object
      properties:
        user_pseudo:
          type: string
          minLength: 3
          maxLength: 50
          pattern: '^[a-zA-Z0-9_-]+
        user_email:
          type: string
          format: email
          maxLength: 255
        user_avatar:
          type: string
          format: uri
          nullable: true
        user_timezone:
          type: string
        user_language:
          type: string
          pattern: '^[a-z]{2}
      additionalProperties: false
      minProperties: 1

    ChangePasswordRequest:
      type: object
      properties:
        current_password:
          type: string
          description: Mot de passe actuel
        new_password:
          type: string
          minLength: 8
          pattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).+
          description: Nouveau mot de passe
        confirm_password:
          type: string
          description: Confirmation du nouveau mot de passe
      required:
        - current_password
        - new_password
        - confirm_password
      additionalProperties: false

    DeleteAccountRequest:
      type: object
      properties:
        password:
          type: string
          description: Mot de passe pour confirmation
        confirmation:
          type: string
          enum: ["DELETE_MY_ACCOUNT"]
          description: Texte de confirmation
      required:
        - password
        - confirmation
      additionalProperties: false

    AdminUserUpdateRequest:
      type: object
      properties:
        user_pseudo:
          type: string
          minLength: 3
          maxLength: 50
        user_email:
          type: string
          format: email
          maxLength: 255
        user_roles:
          type: array
          items:
            type: string
            enum: [ROLE_USER, ROLE_ADMIN]
          minItems: 1
        user_is_verified:
          type: boolean
        user_timezone:
          type: string
        user_language:
          type: string
          pattern: '^[a-z]{2}
      additionalProperties: false

    AdminDeleteUserRequest:
      type: object
      properties:
        confirmation:
          type: string
          enum: ["DELETE_USER_ACCOUNT"]
        reason:
          type: string
          maxLength: 500
        transfer_games_to:
          type: integer
          nullable: true
          description: ID utilisateur pour transfert des parties
      required:
        - confirmation
      additionalProperties: false

    # Schemas de réponse
    UsersListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/UserPublic'
        pagination:
          $ref: '#/components/schemas/Pagination'
      required:
        - data
        - pagination

    UserProfileResponse:
      $ref: '#/components/schemas/UserProfile'

    UserProfileUpdateResponse:
      allOf:
        - $ref: '#/components/schemas/UserProfile'
        - type: object
          properties:
            message:
              type: string
              description: Message de confirmation
          required:
            - message

    PasswordChangeResponse:
      type: object
      properties:
        message:
          type: string
        sessions_invalidated:
          type: integer
          description: Nombre de sessions invalidées
      required:
        - message
        - sessions_invalidated

    DeleteAccountResponse:
      type: object
      properties:
        message:
          type: string
        games_transferred:
          type: integer
        games_archived:
          type: integer
      required:
        - message
        - games_transferred
        - games_archived

    AvatarUploadResponse:
      type: object
      properties:
        message:
          type: string
        avatar_url:
          type: string
          format: uri
        thumbnails:
          type: object
          properties:
            small:
              type: string
              format: uri
            medium:
              type: string
              format: uri
          required:
            - small
            - medium
      required:
        - message
        - avatar_url
        - thumbnails

    AdminUsersListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            allOf:
              - $ref: '#/components/schemas/UserProfile'
              - type: object
                properties:
                  games_count:
                    $ref: '#/components/schemas/GamesCount'
                required:
                  - games_count
        pagination:
          $ref: '#/components/schemas/Pagination'
        statistics:
          $ref: '#/components/schemas/AdminStatistics'
      required:
        - data
        - pagination
        - statistics

    AdminUserResponse:
      allOf:
        - $ref: '#/components/schemas/UserProfile'
        - type: object
          properties:
            admin_note:
              type: string
              description: Note administrative
          required:
            - admin_note

    AdminDeleteUserResponse:
      type: object
      properties:
        message:
          type: string
        user_id:
          type: integer
        games_handled:
          type: object
          properties:
            transferred:
              type: integer
            archived:
              type: integer
          required:
            - transferred
            - archived
        data_anonymized:
          type: boolean
        deletion_reason:
          type: string
      required:
        - message
        - user_id
        - games_handled
        - data_anonymized

    # Schemas d'erreur
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Type d'erreur
        message:
          type: string
          description: Message d'erreur
        details:
          type: object
          description: Détails supplémentaires
          additionalProperties: true
      required:
        - error
        - message

    ValidationErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          properties:
            details:
              type: object
              description: Erreurs de validation par champ
              additionalProperties:
                type: string
          required:
            - details

  responses:
    BadRequest:
      description: Requête invalide
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "Bad Request"
            message: "Invalid request parameters"

    Unauthorized:
      description: Authentification requise
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "Unauthorized"
            message: "Authentication required"

    Forbidden:
      description: Accès interdit
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "Forbidden"
            message: "Access denied"

    NotFound:
      description: Ressource non trouvée
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "Not Found"
            message: "Resource not found"

    ValidationError:
      description: Erreur de validation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
          example:
            error: "Validation Error"
            message: "Invalid input data"
            details:
              user_email: "Email already exists"
              user_pseudo: "Pseudo must be between 3 and 50 characters"

    UnsupportedMediaType:
      description: Type de média non supporté
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "Unsupported Media Type"
            message: "Only JPG, PNG and WebP files are allowed"

