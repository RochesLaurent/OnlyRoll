openapi: 3.0.3
info:
  title: Module Parties - OnlyRoll API
  description: |
    Documentation complète du module de gestion des parties pour l'application OnlyRoll.
    
    Ce module permet de créer, gérer et participer à des parties de JDR en ligne.
  version: 1.0.0
  contact:
    name: API Support
    email: support@onlyroll.fr

servers:
  - url: https://api.onlyroll.fr/api/v1
    description: Serveur de production
  - url: https://staging-api.onlyroll.fr/api/v1
    description: Serveur de staging
  - url: http://localhost:8000/api/v1
    description: Serveur de développement local

tags:
  - name: games
    description: Gestion des parties de JDR

paths:
  /games:
    get:
      tags:
        - games
      summary: Récupère la liste des parties
      description: |
        Retourne la liste paginée des parties accessibles à l'utilisateur.
        
        **Visibilité :**
        - Parties publiques : visibles par tous
        - Parties privées : visibles uniquement si membre
        - Filtrage par statut, places disponibles, etc.
      operationId: getGamesList
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: Numéro de page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Nombre de parties par page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - name: status
          in: query
          description: Filtrer par statut
          required: false
          schema:
            type: string
            enum: [preparation, active, paused, archived]
        - name: visibility
          in: query
          description: Filtrer par visibilité
          required: false
          schema:
            type: string
            enum: [public, private, all]
            default: all
        - name: has_slots
          in: query
          description: Parties avec places disponibles uniquement
          required: false
          schema:
            type: boolean
        - name: search
          in: query
          description: Recherche dans le nom et la description
          required: false
          schema:
            type: string
            minLength: 2
        - name: sort
          in: query
          description: Champ de tri
          required: false
          schema:
            type: string
            enum: [created_at, updated_at, name, players_count]
            default: created_at
        - name: order
          in: query
          description: Ordre de tri
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: Liste des parties récupérée avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GamesListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

    post:
      tags:
        - games
      summary: Crée une nouvelle partie
      description: |
        Crée une nouvelle partie de JDR.
        
        **Processus :**
        1. Validation des données
        2. Création avec statut "preparation"
        3. L'utilisateur devient automatiquement MJ
        4. Configuration des paramètres de jeu
      operationId: createGame
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGameRequest'
            examples:
              public_game:
                summary: Partie publique
                value:
                  name: "Donjons & Dragons - Campagne des Royaumes Oubliés"
                  description: "Une aventure épique dans les Royaumes Oubliés"
                  max_players: 6
                  is_public: true
                  settings:
                    system: "D&D 5e"
                    difficulty: "moderate"
              private_game:
                summary: Partie privée avec mot de passe
                value:
                  name: "Partie privée entre amis"
                  description: "Notre campagne hebdomadaire"
                  max_players: 4
                  is_public: false
                  password: "SecretPass123"
      responses:
        '201':
          description: Partie créée avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /games/my:
    get:
      tags:
        - games
      summary: Récupère mes parties
      description: |
        Retourne la liste des parties où l'utilisateur est impliqué.
        
        **Inclut :**
        - Parties où je suis MJ
        - Parties où je suis joueur
        - Parties où j'ai une invitation en attente
      operationId: getMyGames
      security:
        - bearerAuth: []
      parameters:
        - name: role
          in: query
          description: Filtrer par mon rôle dans la partie
          required: false
          schema:
            type: string
            enum: [master, player, invited, all]
            default: all
        - name: status
          in: query
          description: Filtrer par statut de partie
          required: false
          schema:
            type: string
            enum: [preparation, active, paused, archived]
      responses:
        '200':
          description: Liste de mes parties
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyGamesListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /games/{id}:
    get:
      tags:
        - games
      summary: Récupère le détail d'une partie
      description: |
        Retourne les informations complètes d'une partie.
        
        **Accès :**
        - Parties publiques : accessible à tous
        - Parties privées : accessible uniquement aux membres
      operationId: getGameById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID de la partie
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Détails de la partie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameDetailResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          description: Partie non trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - games
      summary: Met à jour complètement une partie
      description: |
        Met à jour toutes les informations d'une partie.
        
        **Restrictions :**
        - Réservé au MJ de la partie
        - Parties archivées non modifiables
      operationId: updateGame
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID de la partie
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGameRequest'
      responses:
        '200':
          description: Partie mise à jour avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          description: Partie non trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      tags:
        - games
      summary: Met à jour partiellement une partie
      description: |
        Met à jour certains champs d'une partie.
        
        **Avantages :**
        - Modification ciblée
        - Validation adaptée aux champs envoyés
      operationId: patchGame
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID de la partie
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchGameRequest'
            examples:
              change_status:
                summary: Changer le statut
                value:
                  status: "active"
              update_settings:
                summary: Modifier les paramètres
                value:
                  max_players: 8
                  settings:
                    difficulty: "hard"
      responses:
        '200':
          description: Partie mise à jour avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

    delete:
      tags:
        - games
      summary: Supprime une partie
      description: |
        Supprime définitivement une partie et toutes ses données associées.
        
        **Restrictions :**
        - Réservé au MJ
        - Confirmation requise pour parties actives
        - Suppression en cascade
      operationId: deleteGame
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID de la partie
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteGameRequest'
      responses:
        '200':
          description: Partie supprimée avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteGameResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          description: Partie non trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /games/{id}/join:
    post:
      tags:
        - games
      summary: Rejoindre une partie publique
      description: |
        Permet de rejoindre une partie publique ou privée avec mot de passe.
        
        **Validations :**
        - Places disponibles
        - Partie non archivée
        - Pas déjà membre
      operationId: joinGame
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID de la partie
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinGameRequest'
            example:
              password: "SecretPass123"
      responses:
        '200':
          description: Partie rejointe avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JoinGameResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Accès refusé (mot de passe incorrect, partie pleine, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Partie non trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /games/{id}/leave:
    post:
      tags:
        - games
      summary: Quitter une partie
      description: |
        Permet de quitter une partie dont on est membre.
        
        **Restrictions :**
        - Le MJ ne peut pas quitter sa partie (doit transférer ou supprimer)
      operationId: leaveGame
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID de la partie
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Partie quittée avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Action non autorisée (MJ ne peut pas quitter)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Partie non trouvée ou non membre
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /games/{id}/invite:
    post:
      tags:
        - games
      summary: Inviter des joueurs à une partie
      description: |
        Permet d'inviter un ou plusieurs joueurs à une partie.
        
        **Permissions :**
        - MJ et co-MJ peuvent inviter
        - Places disponibles requises
      operationId: inviteToGame
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID de la partie
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvitePlayersRequest'
            examples:
              single_invite:
                summary: Inviter un joueur
                value:
                  user_ids: [456]
              multiple_invites:
                summary: Inviter plusieurs joueurs
                value:
                  user_ids: [456, 789, 321]
                  message: "Rejoignez notre campagne épique!"
      responses:
        '200':
          description: Invitations envoyées avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitePlayersResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          description: Partie non trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /games/{id}/invitation:
    put:
      tags:
        - games
      summary: Répondre à une invitation
      description: |
        Permet d'accepter ou refuser une invitation à une partie.
        
        **Actions :**
        - accept : rejoint la partie
        - decline : refuse l'invitation
      operationId: respondToInvitation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID de la partie
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvitationResponseRequest'
            examples:
              accept:
                summary: Accepter l'invitation
                value:
                  action: "accept"
              decline:
                summary: Refuser l'invitation
                value:
                  action: "decline"
      responses:
        '200':
          description: Réponse enregistrée avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitationResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Invitation non trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /games/{id}/players:
    get:
      tags:
        - games
      summary: Liste les joueurs d'une partie
      description: |
        Retourne la liste des joueurs d'une partie avec leurs rôles et statuts.
        
        **Visibilité :**
        - Informations complètes pour les membres
        - Informations limitées pour les non-membres (parties publiques)
      operationId: getGamePlayers
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID de la partie
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Liste des joueurs récupérée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GamePlayersResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          description: Partie non trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /games/{id}/players/{playerId}:
    put:
      tags:
        - games
      summary: Modifier le rôle d'un joueur
      description: |
        Permet de modifier le rôle ou le statut d'un joueur dans une partie.
        
        **Actions possibles :**
        - Promouvoir en co-MJ
        - Rétrograder en joueur
        - Passer en spectateur
        - Bannir de la partie
      operationId: updatePlayerRole
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID de la partie
          schema:
            type: integer
            minimum: 1
        - name: playerId
          in: path
          required: true
          description: ID du joueur
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePlayerRoleRequest'
            examples:
              promote_co_gm:
                summary: Promouvoir co-MJ
                value:
                  role: "co_gm"
              ban_player:
                summary: Bannir un joueur
                value:
                  status: "banned"
                  reason: "Comportement inapproprié"
      responses:
        '200':
          description: Rôle du joueur mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerRoleResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          description: Partie ou joueur non trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - games
      summary: Retirer un joueur d'une partie
      description: |
        Retire un joueur de la partie (expulsion).
        
        **Restrictions :**
        - Réservé au MJ
        - Impossible de s'expulser soi-même
      operationId: removePlayer
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID de la partie
          schema:
            type: integer
            minimum: 1
        - name: playerId
          in: path
          required: true
          description: ID du joueur à retirer
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemovePlayerRequest'
            example:
              reason: "Inactivité prolongée"
      responses:
        '200':
          description: Joueur retiré avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          description: Partie ou joueur non trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /games/{id}/transfer-ownership:
    post:
      tags:
        - games
      summary: Transférer la maîtrise d'une partie
      description: |
        Transfère la maîtrise de la partie à un autre joueur.
        
        **Processus :**
        - Action irréversible
        - Le nouveau MJ doit être un joueur actif
        - L'ancien MJ peut rester joueur ou quitter
      operationId: transferGameOwnership
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID de la partie
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferOwnershipRequest'
            example:
              new_master_id: 789
              stay_as_player: true
      responses:
        '200':
          description: Maîtrise transférée avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferOwnershipResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          description: Partie non trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /games/{id}/status:
    patch:
      tags:
        - games
      summary: Changer le statut d'une partie
      description: |
        Change le statut d'une partie.
        
        **Transitions autorisées :**
        - preparation → active (min 2 joueurs)
        - active ⟷ paused
        - any → archived (confirmation requise)
      operationId: changeGameStatus
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID de la partie
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeStatusRequest'
            examples:
              activate:
                summary: Activer la partie
                value:
                  status: "active"
              archive:
                summary: Archiver la partie
                value:
                  status: "archived"
                  confirmation: true
      responses:
        '200':
          description: Statut modifié avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusChangeResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          description: Partie non trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    # Énumérations
    GameStatus:
      type: string
      enum: [preparation, active, paused, archived]
      description: Statut d'une partie

    PlayerRole:
      type: string
      enum: [player, co_gm, spectator]
      description: Rôle d'un joueur dans une partie

    PlayerStatus:
      type: string
      enum: [invited, active, inactive, banned]
      description: Statut d'un joueur dans une partie

    # Schemas de base
    Game:
      type: object
      properties:
        game_id:
          type: integer
          description: ID unique de la partie
        game_name:
          type: string
          minLength: 3
          maxLength: 250
          description: Nom de la partie
        game_description:
          type: string
          nullable: true
          description: Description de la partie
        game_master_id:
          type: integer
          description: ID du maître de jeu
        game_status:
          $ref: '#/components/schemas/GameStatus'
        game_max_players:
          type: integer
          minimum: 2
          maximum: 20
          default: 6
          description: Nombre maximum de joueurs
        game_is_public:
          type: boolean
          default: false
          description: Partie publique ou privée
        game_settings:
          type: object
          nullable: true
          description: Paramètres personnalisés de la partie
        game_created_at:
          type: string
          format: date-time
        game_updated_at:
          type: string
          format: date-time
        players_count:
          type: integer
          description: Nombre actuel de joueurs
        available_slots:
          type: integer
          description: Places disponibles
      required:
        - game_id
        - game_name
        - game_master_id
        - game_status
        - game_max_players
        - game_is_public
        - game_created_at
        - game_updated_at

    GamePlayer:
      type: object
      properties:
        game_player_id:
          type: integer
        user_id:
          type: integer
        user_pseudo:
          type: string
          description: Pseudo du joueur
        user_avatar:
          type: string
          nullable: true
          description: Avatar du joueur
        player_role:
          $ref: '#/components/schemas/PlayerRole'
        player_status:
          $ref: '#/components/schemas/PlayerStatus'
        joined_at:
          type: string
          format: date-time
        last_activity:
          type: string
          format: date-time
          nullable: true
      required:
        - game_player_id
        - user_id
        - user_pseudo
        - player_role
        - player_status
        - joined_at

    GameSummary:
      type: object
      properties:
        game_id:
          type: integer
        game_name:
          type: string
        game_status:
          $ref: '#/components/schemas/GameStatus'
        game_is_public:
          type: boolean
        players_count:
          type: integer
        game_max_players:
          type: integer
        master_pseudo:
          type: string
        created_at:
          type: string
          format: date-time
        is_member:
          type: boolean
          description: Si l'utilisateur est membre de cette partie
        my_role:
          $ref: '#/components/schemas/PlayerRole'
          nullable: true
          description: Mon rôle si je suis membre
      required:
        - game_id
        - game_name
        - game_status
        - game_is_public
        - players_count
        - game_max_players
        - master_pseudo
        - created_at
        - is_member

    UserPublic:
      type: object
      properties:
        user_id:
          type: integer
        user_pseudo:
          type: string
        user_avatar:
          type: string
          nullable: true
      required:
        - user_id
        - user_pseudo

    Pagination:
      type: object
      properties:
        current_page:
          type: integer
          minimum: 1
        per_page:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        total_pages:
          type: integer
          minimum: 0
        has_next:
          type: boolean
        has_prev:
          type: boolean
      required:
        - current_page
        - per_page
        - total
        - total_pages
        - has_next
        - has_prev

    # Requêtes
    CreateGameRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 250
          description: Nom de la partie
        description:
          type: string
          maxLength: 2000
          nullable: true
          description: Description de la partie
        max_players:
          type: integer
          minimum: 2
          maximum: 20
          default: 6
        is_public:
          type: boolean
          default: false
        password:
          type: string
          minLength: 4
          maxLength: 50
          nullable: true
        status:
          $ref: '#/components/schemas/GameStatus'
        settings:
          type: object
          nullable: true
      minProperties: 1
      additionalProperties: false

    DeleteGameRequest:
      type: object
      properties:
        confirmation:
          type: string
          enum: ["DELETE_GAME"]
          description: Confirmation pour parties actives
      additionalProperties: false

    JoinGameRequest:
      type: object
      properties:
        password:
          type: string
          description: Mot de passe pour partie privée
      additionalProperties: false

    InvitePlayersRequest:
      type: object
      required:
        - user_ids
      properties:
        user_ids:
          type: array
          items:
            type: integer
          minItems: 1
          maxItems: 10
          description: IDs des utilisateurs à inviter
        message:
          type: string
          maxLength: 500
          nullable: true
          description: Message personnalisé d'invitation
      additionalProperties: false

    InvitationResponseRequest:
      type: object
      required:
        - action
      properties:
        action:
          type: string
          enum: [accept, decline]
          description: Accepter ou refuser l'invitation
      additionalProperties: false

    UpdatePlayerRoleRequest:
      type: object
      properties:
        role:
          $ref: '#/components/schemas/PlayerRole'
        status:
          $ref: '#/components/schemas/PlayerStatus'
        reason:
          type: string
          maxLength: 500
          nullable: true
          description: Raison du changement (pour traçabilité)
      minProperties: 1
      additionalProperties: false

    RemovePlayerRequest:
      type: object
      properties:
        reason:
          type: string
          maxLength: 500
          nullable: true
          description: Raison de l'expulsion
      additionalProperties: false

    TransferOwnershipRequest:
      type: object
      required:
        - new_master_id
      properties:
        new_master_id:
          type: integer
          description: ID du nouveau maître de jeu
        stay_as_player:
          type: boolean
          default: true
          description: Rester comme joueur après transfert
      additionalProperties: false

    ChangeStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          $ref: '#/components/schemas/GameStatus'
        confirmation:
          type: boolean
          default: false
          description: Confirmation pour archivage
      additionalProperties: false

    # Réponses
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Opération réussie"

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Une erreur s'est produite"
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: "Détails des erreurs par champ"

    GamesListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: '#/components/schemas/GameSummary'
        pagination:
          $ref: '#/components/schemas/Pagination'
        statistics:
          type: object
          properties:
            total_games:
              type: integer
            public_games:
              type: integer
            active_games:
              type: integer
          required:
            - total_games
            - public_games
            - active_games
      required:
        - success
        - data
        - pagination

    MyGamesListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            as_master:
              type: array
              items:
                $ref: '#/components/schemas/GameSummary'
            as_player:
              type: array
              items:
                $ref: '#/components/schemas/GameSummary'
            invited:
              type: array
              items:
                $ref: '#/components/schemas/GameSummary'
          required:
            - as_master
            - as_player
            - invited
      required:
        - success
        - data

    GameResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: '#/components/schemas/Game'
      required:
        - success
        - message
        - data

    GameDetailResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          allOf:
            - $ref: '#/components/schemas/Game'
            - type: object
              properties:
                master:
                  $ref: '#/components/schemas/UserPublic'
                players:
                  type: array
                  items:
                    $ref: '#/components/schemas/GamePlayer'
                maps_count:
                  type: integer
                  description: Nombre de cartes dans la partie
                is_member:
                  type: boolean
                my_role:
                  $ref: '#/components/schemas/PlayerRole'
                  nullable: true
              required:
                - master
                - players
                - maps_count
                - is_member
      required:
        - success
        - data

    DeleteGameResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            game_id:
              type: integer
            players_notified:
              type: integer
            maps_deleted:
              type: integer
          required:
            - game_id
            - players_notified
            - maps_deleted
      required:
        - success
        - message
        - data

    JoinGameResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            game:
              $ref: '#/components/schemas/Game'
            player_role:
              $ref: '#/components/schemas/PlayerRole'
          required:
            - game
            - player_role
      required:
        - success
        - message
        - data

    InvitePlayersResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            invited:
              type: array
              items:
                type: object
                properties:
                  user_id:
                    type: integer
                  user_pseudo:
                    type: string
                  invitation_sent:
                    type: boolean
                required:
                  - user_id
                  - user_pseudo
                  - invitation_sent
            failed:
              type: array
              items:
                type: object
                properties:
                  user_id:
                    type: integer
                  reason:
                    type: string
                required:
                  - user_id
                  - reason
          required:
            - invited
            - failed
      required:
        - success
        - message
        - data

    InvitationResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            action:
              type: string
              enum: [accepted, declined]
            game:
              $ref: '#/components/schemas/GameSummary'
              nullable: true
          required:
            - action
      required:
        - success
        - message
        - data

    GamePlayersResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            game_id:
              type: integer
            players:
              type: array
              items:
                $ref: '#/components/schemas/GamePlayer'
            total_players:
              type: integer
            max_players:
              type: integer
          required:
            - game_id
            - players
            - total_players
            - max_players
      required:
        - success
        - data

    PlayerRoleResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: '#/components/schemas/GamePlayer'
      required:
        - success
        - message
        - data

    TransferOwnershipResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            game_id:
              type: integer
            new_master:
              $ref: '#/components/schemas/UserPublic'
            old_master_role:
              $ref: '#/components/schemas/PlayerRole'
              nullable: true
          required:
            - game_id
            - new_master
      required:
        - success
        - message
        - data

    StatusChangeResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            game_id:
              type: integer
            old_status:
              $ref: '#/components/schemas/GameStatus'
            new_status:
              $ref: '#/components/schemas/GameStatus'
            players_notified:
              type: integer
          required:
            - game_id
            - old_status
            - new_status
            - players_notified
      required:
        - success
        - message
        - data

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Token JWT obtenu via l'endpoint de connexion.
        
        **Utilisation :**
        ```
        Authorization: Bearer <votre_token_jwt>
        ```

  responses:
    UnauthorizedError:
      description: Token d'authentification manquant ou invalide
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: "Token d'authentification requis"

    ForbiddenError:
      description: Permissions insuffisantes
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: "Permissions insuffisantes pour cette action"

    ValidationError:
      description: Erreurs de validation des données
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: "Données invalides"
            errors:
              name: ["Le nom doit contenir entre 3 et 250 caractères"]
              max_players: ["Le nombre de joueurs doit être entre 2 et 20"]

security:
  - bearerAuth: []

